<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Ancient Greek Tragedy | Visuals</title>

    <style>
        :root {
            --bg: #ffd600;
            --ink: #111;
            --paper: #fff;
            --shadow: 4px 4px 0px var(--ink);
            --radius: 12px;
            --gap: 14px;
            --control-font: clamp(1rem, 1.5vw, 1.15rem);
            --control-pad-y: 12px;
            --control-pad-x: 20px;
            --logo-size: 70px;
            --controls-padding: 14px;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg);
            background-image: radial-gradient(var(--ink) 1.5px, transparent 1.5px);
            background-size: 25px 25px;
            font-family: Arial, Helvetica, sans-serif;
            overflow: hidden;
            color: var(--ink);
        }

        body.smartboard-mode {
            --control-font: clamp(1.2rem, 1.8vw, 1.45rem);
            --control-pad-y: 16px;
            --control-pad-x: 28px;
            --logo-size: 92px;
            --controls-padding: 18px;
        }

        .layout-wrapper {
            display: flex;
            flex-direction: column;
            height: 100svh;
            width: 100vw;
            position: relative;
        }

        .logo-overlay {
            position: fixed;
            top: max(12px, env(safe-area-inset-top));
            right: max(12px, env(safe-area-inset-right));
            z-index: 1000;
            pointer-events: none;
        }

        .logo-overlay img {
            width: min(var(--logo-size), 18vw);
            max-width: 100%;
            height: auto;
            filter: drop-shadow(1px 2px 4px rgba(0,0,0,0.3));
        }

        .status-chip {
            position: fixed;
            top: max(12px, env(safe-area-inset-top));
            left: max(12px, env(safe-area-inset-left));
            z-index: 1000;
            background: rgba(255,255,255,0.95);
            border: 3px solid var(--ink);
            box-shadow: var(--shadow);
            border-radius: 999px;
            padding: 8px 14px;
            font-size: clamp(0.95rem, 1.3vw, 1rem);
            font-weight: 700;
        }

        .carousel-container {
            flex: 1;
            overflow: auto;
            position: relative;
            scroll-behavior: smooth;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: clamp(20px, 3vw, 36px);
            padding-top: calc(clamp(20px, 3vw, 36px) + env(safe-area-inset-top));
            touch-action: pan-y pinch-zoom;
        }

        .slide {
            display: none;
            width: 100%;
            height: 100%;
        }

        .slide.active {
            display: flex;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.35s ease-in-out;
            width: 100%;
        }

        .slide img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            cursor: pointer;
            user-select: none;
            -webkit-user-drag: none;
            border-radius: 14px;
        }

        .carousel-container.zoomed {
            display: block;
        }

        .carousel-container.zoomed .slide.active {
            display: block;
            height: auto;
        }

        .carousel-container.zoomed .slide img {
            width: 100%;
            max-width: 100%;
            max-height: none;
            height: auto;
            object-fit: unset;
            cursor: auto;
        }

        .controls-bar {
            background-color: var(--bg);
            border-top: 4px solid var(--ink);
            padding: var(--controls-padding);
            padding-left: max(var(--controls-padding), env(safe-area-inset-left));
            padding-right: max(var(--controls-padding), env(safe-area-inset-right));
            padding-bottom: max(var(--controls-padding), env(safe-area-inset-bottom));
            display: flex;
            justify-content: center;
            gap: var(--gap);
            z-index: 1000;
            flex-shrink: 0;
            flex-wrap: wrap;
        }

        .controls-bar button {
            background-color: var(--paper);
            color: var(--ink);
            border: 3px solid var(--ink);
            box-shadow: var(--shadow);
            padding: var(--control-pad-y) var(--control-pad-x);
            font-size: var(--control-font);
            font-weight: 800;
            border-radius: var(--radius);
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s, background-color 0.1s;
            min-height: 52px;
            min-width: 132px;
            touch-action: manipulation;
        }

        .controls-bar button:hover,
        .controls-bar button:focus-visible {
            background-color: #fffbe6;
            outline: none;
        }

        .controls-bar button:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px var(--ink);
        }

        #smartboardBtn.active-toggle {
            background-color: #00f0ff;
        }

        #zoomBtn.active-toggle {
            background-color: #39ff14;
        }

        .helper-text {
            position: fixed;
            bottom: calc(86px + env(safe-area-inset-bottom));
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            background: rgba(255,255,255,0.95);
            border: 3px solid var(--ink);
            box-shadow: var(--shadow);
            border-radius: 999px;
            padding: 8px 14px;
            font-size: clamp(0.9rem, 1.2vw, 0.98rem);
            font-weight: 700;
            text-align: center;
            max-width: min(92vw, 720px);
        }

        @media (max-width: 900px) {
            .controls-bar {
                gap: 10px;
            }

            .controls-bar button {
                flex: 1 1 calc(50% - 10px);
                min-width: 0;
            }

            .helper-text {
                bottom: calc(142px + env(safe-area-inset-bottom));
                width: calc(100vw - 28px);
                border-radius: 18px;
            }
        }

        @media (max-width: 640px) {
            .carousel-container {
                padding: 14px;
                padding-top: calc(14px + env(safe-area-inset-top) + 44px);
            }

            .status-chip {
                font-size: 0.9rem;
                padding: 7px 12px;
            }

            .logo-overlay img {
                width: min(var(--logo-size), 15vw + 18px);
            }

            .controls-bar {
                justify-content: stretch;
            }

            .controls-bar button {
                flex: 1 1 100%;
                width: 100%;
            }

            .helper-text {
                bottom: calc(286px + env(safe-area-inset-bottom));
                font-size: 0.88rem;
                line-height: 1.35;
            }
        }

        @media (pointer: coarse) {
            .controls-bar button {
                min-height: 56px;
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="status-chip" id="slideCounter">1 / 6</div>

    <div class="logo-overlay">
        <img src="logo_GR.png" alt="Λογότυπο">
    </div>

    <div class="layout-wrapper">
        <div class="carousel-container" id="carousel" aria-live="polite">
            <div class="slide active"><img src="1.png" alt="Σκηνή 1"></div>
            <div class="slide"><img src="2.png" alt="Σκηνή 2"></div>
            <div class="slide"><img src="3.png" alt="Σκηνή 3"></div>
            <div class="slide"><img src="4.png" alt="Σκηνή 4"></div>
            <div class="slide"><img src="5.png" alt="Σκηνή 5"></div>
            <div class="slide"><img src="6.png" alt="Σκηνή 6"></div>
        </div>

        <div class="helper-text" id="helperText">Swipe ή πάτησε την εικόνα για επόμενη · Βελάκια πληκτρολογίου για πλοήγηση</div>

        <div class="controls-bar">
            <button id="prevBtn" type="button">⬅ Προηγούμενη</button>
            <button id="nextBtn" type="button">Επόμενη ➔</button>
            <button id="zoomBtn" type="button">🔍 Μεγέθυνση</button>
            <button id="smartboardBtn" type="button">🖥️ Smartboard Mode</button>
        </div>
    </div>

    <script>
        let currentSlide = 0;
        const slides = document.querySelectorAll('.slide');
        const container = document.getElementById('carousel');
        const zoomBtn = document.getElementById('zoomBtn');
        const nextBtn = document.getElementById('nextBtn');
        const prevBtn = document.getElementById('prevBtn');
        const smartboardBtn = document.getElementById('smartboardBtn');
        const slideCounter = document.getElementById('slideCounter');
        const helperText = document.getElementById('helperText');
        let isZoomed = false;
        let touchStartX = 0;
        let touchEndX = 0;

        function updateCounter() {
            slideCounter.textContent = `${currentSlide + 1} / ${slides.length}`;
        }

        function resetScroll() {
            container.scrollTop = 0;
            container.scrollLeft = 0;
        }

        function setSlide(index) {
            slides[currentSlide].classList.remove('active');
            currentSlide = (index + slides.length) % slides.length;
            slides[currentSlide].classList.add('active');

            if (isZoomed) {
                toggleZoom(false);
            }

            updateCounter();
            resetScroll();
        }

        function nextSlide() {
            setSlide(currentSlide + 1);
        }

        function prevSlide() {
            setSlide(currentSlide - 1);
        }

        function toggleZoom(forceState) {
            isZoomed = typeof forceState === 'boolean' ? forceState : !isZoomed;

            if (isZoomed) {
                container.classList.add('zoomed');
                zoomBtn.innerHTML = '🔍 Σμίκρυνση';
                zoomBtn.classList.add('active-toggle');
                helperText.textContent = 'Σε μεγέθυνση μπορείς να κάνεις scroll μέσα στην εικόνα';
            } else {
                container.classList.remove('zoomed');
                zoomBtn.innerHTML = '🔍 Μεγέθυνση';
                zoomBtn.classList.remove('active-toggle');
                helperText.textContent = 'Swipe ή πάτησε την εικόνα για επόμενη · Βελάκια πληκτρολογίου για πλοήγηση';
            }
            resetScroll();
        }

        function toggleSmartboardMode() {
            document.body.classList.toggle('smartboard-mode');
            smartboardBtn.classList.toggle('active-toggle');
        }

        nextBtn.addEventListener('click', nextSlide);
        prevBtn.addEventListener('click', prevSlide);
        zoomBtn.addEventListener('click', () => toggleZoom());
        smartboardBtn.addEventListener('click', toggleSmartboardMode);

        slides.forEach(slide => {
            const img = slide.querySelector('img');
            img.addEventListener('click', function() {
                if (!isZoomed) {
                    nextSlide();
                }
            });
        });

        document.addEventListener('keydown', function(event) {
            if (event.key === 'ArrowRight') {
                nextSlide();
            } else if (event.key === 'ArrowLeft') {
                prevSlide();
            } else if (event.key === 'z' || event.key === 'Z') {
                toggleZoom();
            } else if (event.key === 's' || event.key === 'S') {
                toggleSmartboardMode();
            }
        });

        container.addEventListener('touchstart', function(event) {
            if (event.touches.length === 1) {
                touchStartX = event.changedTouches[0].screenX;
            }
        }, { passive: true });

        container.addEventListener('touchend', function(event) {
            if (isZoomed) return;
            touchEndX = event.changedTouches[0].screenX;
            const deltaX = touchEndX - touchStartX;

            if (Math.abs(deltaX) > 50) {
                if (deltaX < 0) {
                    nextSlide();
                } else {
                    prevSlide();
                }
            }
        }, { passive: true });

        updateCounter();
    </script>
</body>
</html>
